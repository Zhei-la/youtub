<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가입 신청 — ShortsForge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/common.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="logo">
      <div class="logo-mark">S</div>
      <div class="logo-text">Shorts<span>Forge</span></div>
    </div>
    <h1>가입 신청</h1>
    <div class="sub">관리자 승인 후 로그인할 수 있습니다</div>

    <form class="form-grid" id="signup-form">
      <div class="field">
        <label>아이디</label>
        <input type="text" id="username" minlength="3" maxlength="32" pattern="[a-zA-Z0-9_]+" required />
        <div class="help">영문/숫자/언더스코어, 3~32자</div>
      </div>
      <div class="field">
        <label>비밀번호</label>
        <input type="password" id="password" minlength="6" required />
        <div class="help">6자 이상</div>
      </div>
      <div class="field">
        <label>관리자에게 전달할 메모 (선택)</label>
        <textarea id="note" placeholder="구매 경로 등"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-large" id="signup-btn">가입 신청</button>
    </form>

    <div class="footer-link">
      이미 계정이 있으신가요? <a href="/login.html">로그인</a>
    </div>
  </div>
</div>

<script src="/common.js"></script>
<script>
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  btn.disabled = true;
  btn.textContent = '신청 중...';
  try {
    const result = await api('/api/auth/signup', {
      method: 'POST',
      body: {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
        note: document.getElementById('note').value.trim()
      }
    });
    toast(result.message || '가입 신청 완료', 'success');
    setTimeout(() => { location.href = '/login.html'; }, 1800);
  } catch (e) {
    toast(e.message || '가입 실패', 'error');
    btn.disabled = false;
    btn.textContent = '가입 신청';
  }
});
</script>
</body>
</html>
